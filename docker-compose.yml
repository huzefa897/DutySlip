version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dutyslip_db
    environment:
      POSTGRES_DB: dutyslip
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
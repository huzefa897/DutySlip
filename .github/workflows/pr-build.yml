name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  docker-build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false

      - name: Run pre-commit
        run: pre-commit run --all-files